name: Build & Push RunPod Serverless Image

on:
  push:
    branches: [develop, main]
    paths:
      - "handler.py"
      - "Dockerfile.serverless"
      - "requirements-handler.txt"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate build info
        run: |
          echo "{" > build_info.json
          echo '  "version": "2.0.0",' >> build_info.json
          echo '  "git_commit": "${{ github.sha }}",' >> build_info.json
          echo '  "branch": "${{ github.ref_name }}",' >> build_info.json
          echo '  "build_date": "'"$(date -u +'%Y-%m-%dT%H:%M:%SZ')"'"' >> build_info.json
          echo "}" >> build_info.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=serverless
            type=sha,prefix=serverless-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.serverless
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
