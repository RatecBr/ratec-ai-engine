name: Build & Push AI Runtime

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
    paths:
      - "Dockerfile.runtime"
      - "scripts/start.sh"
      - "handler.py"
      - "requirements-handler.txt"
      - "runtime/**"
      - "workflows/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate build info
        run: |
          echo "{" > build_info.json
          echo '  "engine_version": "2.0.0",' >> build_info.json
          echo '  "git_commit": "${{ github.sha }}",' >> build_info.json
          echo '  "git_short_commit": "'$(echo ${{ github.sha }} | cut -c1-7)'",' >> build_info.json
          echo '  "git_branch": "${{ github.ref_name }}",' >> build_info.json
          echo '  "docker_image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",' >> build_info.json
          echo '  "docker_tag": "runtime-${{ github.sha }}",' >> build_info.json
          echo '  "build_date": "'"$(date -u +'%Y-%m-%dT%H:%M:%SZ')"'",' >> build_info.json
          echo '  "github_run_id": "${{ github.run_id }}",' >> build_info.json
          echo '  "github_run_number": "${{ github.run_number }}",' >> build_info.json
          echo '  "github_repository": "${{ github.repository }}"' >> build_info.json
          echo "}" >> build_info.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=runtime
            type=sha,prefix=runtime-
          labels: |
            org.opencontainers.image.version=2.0.0
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
