services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_DEBUG=true
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  handler:
    build: .
    env_file:
      - .env
    profiles:
      - runpod
    command: python handler.py
