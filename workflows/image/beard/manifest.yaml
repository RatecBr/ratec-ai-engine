id: image/beard
version: "0.1.0"
name: Beard
provider: comfyui
status: planned

description: >
  Aplica ou remove barba em uma pessoa na imagem.
  Reutiliza os mesmos componentes do workflow haircut.

requirements:
  gpu: true
  min_vram: "24GB"
  depends_on:
    - image/face-segmentation
    - image/background-remove

inputs:
  - name: image
    type: base64
  - name: reference_image
    type: base64
    required: false
  - name: node_overrides
    type: object
    required: false

outputs:
  - name: images
    type: object[]

metadata:
  category: image
  tags: [beard, fashion, flux, ipadapter]
  consumers: [GOODLOOK]
